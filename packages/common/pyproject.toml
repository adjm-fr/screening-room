[project]
name = "common"
version = "0.1.0"
description = "Shared library for the cinema monorepo: pydantic-settings base, logging setup, validated parquet IO."
requires-python = ">=3.13"
dependencies = [
    "pydantic-settings>=2.14.1",
    "pandas>=3.0.3",
    # pyarrow capped <25: 25.0.0's bundled mimalloc segfaults on macOS
    # (mi_thread_init) when the app runs — see CLAUDE.md "Non-obvious behaviors".
    "pyarrow>=24.0.0,<25",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["error", "ignore::DeprecationWarning:pandas"]
