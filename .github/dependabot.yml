version: 2

updates:
  # Single workspace lockfile (uv.lock at the root) — one Dependabot config for
  # the whole monorepo, replacing the per-repo configs the two members used to
  # carry. Weekly, grouped into one PR so there's one CI run and one merge.
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      # pyarrow 25.0.0's bundled mimalloc segfaults on macOS (mi_thread_init on
      # Streamlit's fresh script-runner threads). Held at 24.x — drop this entry
      # once an upstream release is verified to run the dashboard on macOS.
      - dependency-name: "pyarrow"
        versions: [">=25.0.0"]
