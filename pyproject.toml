[project]
name = "cinema-dashboard"
version = "1.0.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "bandit==1.9.4",
    "beautifulsoup4>=4.14.3",
    "click>=8.3.3",
    "dagster>=1.13.4",
    "dagster-webserver>=1.13.4",
    "geopy>=2.4.1",
    "huggingface-hub>=1.14.0",
    "mypy>=2.0.0",
    "pandas>=3.0.2",
    "plotly>=6.7.0",
    "pyarrow>=24.0.0",
    "pydantic-settings>=2.14.1",
    "pytest>=9.0.3",
    "pytest-mock>=3.15.1",
    "python-dotenv>=1.2.2",
    "requests>=2.33.1",
    "ruff==0.15.12",
    "streamlit>=1.57.0",
    "streamlit-calendar>=1.4.0",
    "streamlit-shortcuts>=1.2.1",
    "tabulate>=0.10.0",
]

[tool.ruff]
line-length = 130

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP"]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-v --tb=short"
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:pandas",
]
